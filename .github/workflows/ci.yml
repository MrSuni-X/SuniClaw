# 🚀 CI/CD 工作流

name: 🌟 SuniClaw CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: 🎉 欢迎
        run: |
          echo "✨ 欢迎来到 SuniClaw！"
          echo "🤖 憨憨正在为你服务..."
      
      - name: 📅 显示时间
        run: |
          echo "当前时间：$(date)"
          echo "构建触发者：${{ github.actor }}"

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 🔍 检查文件
        run: |
          echo "📁 仓库文件列表："
          ls -la
          
      - name: ✅ README 检查
        run: |
          if [ -f README.md ]; then
            echo "✅ README.md 存在！"
            echo "📄 内容预览："
            head -20 README.md
          else
            echo "❌ 缺少 README.md"
            exit 1
          fi
